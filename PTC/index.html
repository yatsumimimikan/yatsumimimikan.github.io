<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PNGTuber Web App (v2)</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    
    #camera-bg { 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; 
      position: absolute; 
      z-index: 1; 
    }
    
    #avatar { 
      position: absolute; 
      bottom: 0px; 
      right: 0px; 
      width: 150px; 
      z-index: 2; 
      pointer-events: none;
      /* 座標更新はJS側で滑らかに行うため、CSSのtransitionは削除 */
    }
    
    #start-btn { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 3; 
      padding: 20px; 
      font-size: 18px; 
      cursor: pointer;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <video id="camera-bg" autoplay playsinline muted></video>
  <img id="avatar" src="idle.png" alt="avatar">
  <button id="start-btn">システムを起動 (センサー許可)</button>

  <script>
    const video = document.getElementById('camera-bg');
    const avatar = document.getElementById('avatar');
    const startBtn = document.getElementById('start-btn');

    // 座標制御用の変数（現在値と目標値）
    let currentX = 0, currentY = 0;
    let targetX = 0, targetY = 0;

    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';

      // ==========================================
      // 1. 傾きセンサーの許可とイベント登録
      // ==========================================
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState === 'granted') {
            window.addEventListener('deviceorientation', handleOrientation);
          }
        } catch (error) {
          console.error("センサー許可要求エラー:", error);
        }
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }

      function handleOrientation(event) {
        const gamma = event.gamma || 0; 
        const beta = event.beta || 0;   
        
        // 現在の画面の向きを取得 (0: 縦, 90: 左横, -90: 右横)
        const orientation = window.orientation || 0;

        if (orientation === 0) {
          // 【縦持ち】X軸＝左右の傾き(gamma)、Y軸＝前後の傾き(beta)
          targetX = -gamma * 1.8;
          targetY = -(beta - 70) * 1.5; // 手元で持つ自然な角度(約70度)を基準に
        } else if (orientation === 90) {
          // 【横持ち:左回転】長辺が左右になるため、X軸とY軸のセンサーを入れ替え
          targetX = (beta - 65) * 1.8; 
          targetY = gamma * 1.5;
        } else if (orientation === -90 || orientation === 270) {
          // 【横持ち:右回転】
          targetX = -(beta - 65) * 1.8; 
          targetY = -gamma * 1.5;
        }
      }

      // ==========================================
      // 2. カメラ・マイクの取得と音声解析
      // ==========================================
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }, 
          audio: true
        });

        video.srcObject = new MediaStream([stream.getVideoTracks()[0]]);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(new MediaStream([stream.getAudioTracks()[0]]));
        const analyser = audioCtx.createAnalyser();
        
        // 応答性を極限まで高めるための微調整
        analyser.fftSize = 128; 
        analyser.smoothingTimeConstant = 0.1; // 追従の遅延をほぼゼロにする
        
        source.connect(analyser);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        // ==========================================
        // 3. ランダムな瞬き制御
        // ==========================================
        let isBlinking = false;
        function scheduleBlink() {
          const nextBlinkInterval = Math.random() * 4000 + 2000;
          setTimeout(() => {
            isBlinking = true;
            setTimeout(() => {
              isBlinking = false;
              scheduleBlink();
            }, 120); // 瞬きの速度も少しシャープに(0.12秒)
          }, nextBlinkInterval);
        }
        scheduleBlink();

        // ==========================================
        // 4. メイン描画・計算ループ（音量監視 ＆ 座標平滑化）
        // ==========================================
        function mainLoop() {
          // --- ① リップシンク処理 (最大値判定による高速化) ---
          analyser.getByteFrequencyData(dataArray);
          const maxVolume = Math.max(...dataArray); // 配列内の最大音量を直接取得

          // 閾値判定 (声を遮断した瞬間に閉じます。感度は必要に応じて「25」等の数値を調整)
          if (maxVolume > 100) {
            avatar.src = isBlinking ? 'speak_blink.png' : 'speak.png';
          } else {
            avatar.src = isBlinking ? 'idle_blink.png' : 'idle.png';
          }

          // --- ② 座標処理 (ローパスフィルター ＆ 境界の震え防止) ---
          // イージング（線形補間）により、目標値へ滑らかに近づける (0.15 = 滑らかさの係数)
          currentX += (targetX - currentX) * 0.15;
          currentY += (targetY - currentY) * 0.15;

          // 補間された滑らかな座標に対して、最後に限界値（可動範囲）の制限をかける
          // これにより、限界値の壁にぶつかった時の小刻みな震え（ハンチング）が完全に消滅します
          const clampedX = Math.max(-50, Math.min(50, currentX));
          const clampedY = Math.max(-35, Math.min(35, currentY));

          // アバターの座標を変更
          avatar.style.transform = `translate(${clampedX}px, ${clampedY}px)`;

          requestAnimationFrame(mainLoop);
        }
        mainLoop();

      } catch (err) {
        alert("起動エラー: " + err.message);
        startBtn.style.display = 'block';
      }
    });
  </script>
</body>
</html>
